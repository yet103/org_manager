<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawplan</title>
  <meta name="description" content="描いて計画する — リソース配分・定量管理・抽象モデル作図ツール">
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div id="app">
    <!-- Left Sidebar: Resource List -->
    <aside id="sidebar-left">
      <div class="panel-header">
        <h2>リソース一覧</h2>
        <div style="display:flex;gap:4px;">
          <button class="btn btn-primary btn-icon" id="btn-add-person" title="人的リソースを追加">👤＋</button>
          <button class="btn btn-primary btn-icon" id="btn-add-item" title="物的リソースを追加">📦＋</button>
        </div>
      </div>
      <div class="search-bar">
        <input type="text" id="person-search" placeholder="🔍 検索..." class="search-input">
      </div>
      <div id="person-list"></div>
      <div class="sidebar-separator"></div>
      <div class="panel-header">
        <h2>レイヤー</h2>
        <button class="btn btn-primary btn-icon" id="btn-add-layer" title="レイヤーを追加">＋</button>
      </div>
      <div id="layer-list"></div>
    </aside>

    <!-- Canvas Area -->
    <main id="canvas-area">
      <div id="tab-bar">
        <div id="tab-list"></div>
        <button class="btn btn-icon tab-add-btn" id="btn-add-tab" title="新規タブ">＋</button>
      </div>
      <div id="toolbar">
        <div class="toolbar-group">
          <button class="btn active" id="btn-square-view" title="スクエアビュー">□ スクエア</button>
          <button class="btn" id="btn-quarter-view" title="クォータービュー">◇ クォーター</button>
        </div>
        <div class="toolbar-group">
          <button class="btn active" id="btn-tool-select" title="選択・移動">🖱 選択</button>
          <button class="btn" id="btn-tool-region" title="領域を描画">⬜ 領域</button>
          <button class="btn" id="btn-tool-connector" title="図形描画 (Shift)">✏️ 図形描画</button>
          <button class="btn" id="btn-tool-text" title="テキスト注釈">📝 注釈</button>
        </div>
        <div class="toolbar-group">
          <button class="btn" id="btn-bulk-create" title="一括作成">📋 一括作成</button>
          <button class="btn" id="btn-role-manage" title="役割管理">🏷 役割管理</button>
          <button class="btn" id="btn-plan-table" title="リソース計画テーブル">📊 計画表</button>
          <button class="btn" id="btn-dashboard" title="ダッシュボード">📈 ダッシュボード</button>
        </div>
        <div class="toolbar-group">
          <button class="btn" id="btn-save-file" title="ファイルに保存">💾 保存</button>
          <button class="btn" id="btn-load-file" title="ファイルから読込">📂 読込</button>
          <input type="file" id="file-import-input" accept=".json" style="display:none">
          <button class="btn" id="btn-import-csv" title="CSVインポート">📊 CSV</button>
          <input type="file" id="csv-import-input" accept=".csv,.tsv,.txt" style="display:none">
        </div>
        <div class="toolbar-group">
          <button class="btn" id="btn-export-png" title="PNG画像をエクスポート">📸 画像出力</button>
          <button class="btn" id="btn-print" title="印刷プレビュー">🖨 印刷</button>
        </div>
        <div class="toolbar-group">
          <button class="btn btn-danger" id="btn-delete" title="選択中のリソースを削除">🗑 削除</button>
        </div>
        <div class="toolbar-group">
          <button class="btn btn-icon" id="btn-undo" title="元に戻す (Ctrl+Z)">↩</button>
          <button class="btn btn-icon" id="btn-redo" title="やり直し (Ctrl+Y)">↪</button>
        </div>
        <div class="toolbar-group toolbar-align">
          <span class="toolbar-label">整列</span>
          <button class="btn btn-icon" id="btn-align-left" title="左揃え">⫷</button>
          <button class="btn btn-icon" id="btn-align-center-h" title="水平中央">⫿</button>
          <button class="btn btn-icon" id="btn-align-right" title="右揃え">⫸</button>
          <button class="btn btn-icon" id="btn-align-top" title="上揃え">⤒</button>
          <button class="btn btn-icon" id="btn-align-center-v" title="垂直中央">⎯</button>
          <button class="btn btn-icon" id="btn-align-bottom" title="下揃え">⤓</button>
          <span class="toolbar-sep"></span>
          <button class="btn btn-icon" id="btn-distribute-h" title="水平等間隔">⇔</button>
          <button class="btn btn-icon" id="btn-distribute-v" title="垂直等間隔">⇕</button>
        </div>
        <div class="toolbar-group toolbar-zoom">
          <span class="toolbar-label">🔍</span>
          <span id="zoom-label" class="zoom-label">100%</span>
          <button class="btn btn-icon" id="btn-zoom-reset" title="ズームリセット">⟲</button>
        </div>
        <div class="toolbar-group">
          <button class="btn btn-icon" id="btn-dark-mode" title="ダークモード切替">🌙</button>
          <button class="btn btn-icon" id="btn-share-url" title="共有URLをコピー">🔗</button>
        </div>
      </div>
      <div id="canvas-container">
        <canvas id="main-canvas"></canvas>
      </div>
    </main>

    <!-- Right Sidebar: Properties -->
    <aside id="sidebar-right">
      <div class="panel-header">
        <h2>プロパティ</h2>
      </div>
      <div id="property-content">
        <div id="no-selection-msg">リソースを選択してください</div>
        <div id="person-props" style="display:none;">
          <div class="prop-group">
            <div class="prop-label">名前</div>
            <input type="text" class="prop-input" id="prop-name" placeholder="名前">
          </div>
          <div class="prop-group">
            <div class="prop-label">役割（テキスト）</div>
            <input type="text" class="prop-input" id="prop-role" placeholder="役割">
          </div>
          <div class="prop-group">
            <div class="prop-label">所属</div>
            <input type="text" class="prop-input" id="prop-affiliation" placeholder="所属">
          </div>
          <div class="prop-group">
            <div class="prop-label">色</div>
            <input type="color" class="prop-color-input" id="prop-color" value="#4a8acf">
          </div>
          <div class="prop-group">
            <div class="prop-label">メール</div>
            <input type="email" class="prop-input" id="prop-email" placeholder="example@company.com">
          </div>
          <div class="prop-group">
            <div class="prop-label">電話</div>
            <input type="tel" class="prop-input" id="prop-phone" placeholder="090-xxxx-xxxx">
          </div>
          <div class="prop-group">
            <div class="prop-label">入社日</div>
            <input type="date" class="prop-input" id="prop-joindate">
          </div>
          <div class="prop-group">
            <div class="prop-label">発令日</div>
            <input type="date" class="prop-input" id="prop-effective-date">
          </div>
          <div class="prop-group">
            <div class="prop-label">写真URL</div>
            <input type="url" class="prop-input" id="prop-photo-url" placeholder="https://...">
          </div>
          <div class="prop-group">
            <div class="prop-label">役割ラベル</div>
            <div id="prop-roles-container"></div>
          </div>
          <hr style="border:none;border-top:1px solid #ddd;margin:8px 0;">
          <div class="prop-group">
            <div class="prop-label">基本容量</div>
            <div style="display:flex;gap:4px;align-items:center;">
              <input type="number" class="prop-input" id="prop-capacity" value="1.0" min="0" step="0.1" style="width:70px;">
              <select class="prop-input" id="prop-unit" style="width:80px;">
                <option value="人月">人月</option>
                <option value="人日">人日</option>
                <option value="人時">人時</option>
                <option value="FTE">FTE</option>
              </select>
            </div>
          </div>
          <div class="prop-group">
            <div class="prop-label">単価(円/月)</div>
            <input type="number" class="prop-input" id="prop-cost" value="0" min="0" step="10000" placeholder="800000">
          </div>
          <div class="prop-group">
            <div class="prop-label">リソース配分</div>
            <div id="prop-allocations-container"></div>
            <button class="btn btn-sm" id="btn-add-allocation" style="margin-top:4px;font-size:11px;">＋配分先を追加</button>
            <div id="prop-allocation-summary" style="margin-top:6px;font-size:11px;color:#888;border-top:1px solid #eee;padding-top:4px;"></div>
          </div>
        </div>
        <div id="item-props" style="display:none;">
          <div class="prop-group">
            <div class="prop-label">名前</div>
            <input type="text" class="prop-input" id="prop-item-name" placeholder="リソース名">
          </div>
          <div class="prop-group">
            <div class="prop-label">アイコン</div>
            <select class="prop-input" id="prop-item-icon">
              <!-- Dynamically populated from ICON_REGISTRY -->
            </select>
          </div>
          <div class="prop-group">
            <div class="prop-label">説明</div>
            <textarea class="prop-input" id="prop-item-description" rows="3" placeholder="説明"></textarea>
          </div>
          <div class="prop-group">
            <div class="prop-label">色</div>
            <input type="color" class="prop-color-input" id="prop-item-color" value="#4a8acf">
          </div>
          <hr style="border:none;border-top:1px solid #ddd;margin:8px 0;">
          <div class="prop-group">
            <div class="prop-label">基本容量</div>
            <div style="display:flex;gap:4px;align-items:center;">
              <input type="number" class="prop-input" id="prop-item-capacity" value="1" min="0" step="1" style="width:70px;">
              <select class="prop-input" id="prop-item-unit" style="width:80px;">
                <option value="台">台</option>
                <option value="ライセンス">ライセンス</option>
                <option value="個">個</option>
                <option value="式">式</option>
              </select>
            </div>
          </div>
          <div class="prop-group">
            <div class="prop-label">単価(円/月)</div>
            <input type="number" class="prop-input" id="prop-item-cost" value="0" min="0" step="10000" placeholder="50000">
          </div>
          <div class="prop-group">
            <div class="prop-label">リソース配分</div>
            <div id="prop-item-allocations-container"></div>
            <button class="btn btn-sm" id="btn-add-item-allocation" style="margin-top:4px;font-size:11px;">＋配分先を追加</button>
            <div id="prop-item-allocation-summary" style="margin-top:6px;font-size:11px;color:#888;border-top:1px solid #eee;padding-top:4px;"></div>
          </div>
        </div>
        <div id="region-props" style="display:none;">
          <div class="prop-group">
            <div class="prop-label">領域名</div>
            <input type="text" class="prop-input" id="prop-region-name" placeholder="領域名">
          </div>
          <div class="prop-group">
            <div class="prop-label">領域色</div>
            <input type="color" class="prop-color-input" id="prop-region-color" value="#4a8acf">
          </div>
          <div class="prop-group">
            <div class="prop-label">フォントサイズ</div>
            <input type="number" class="prop-input" id="prop-region-fontsize" value="13" min="8" max="48">
          </div>
          <div class="prop-group">
            <div class="prop-label">テキスト揃え</div>
            <select class="prop-input" id="prop-region-textalign">
              <option value="left">左揃え</option>
              <option value="center">中央揃え</option>
              <option value="right">右揃え</option>
            </select>
          </div>
          <div class="prop-group">
            <div class="prop-label">重なり順</div>
            <div class="zorder-buttons">
              <button class="btn btn-sm" id="btn-z-back" title="最背面">⤓</button>
              <button class="btn btn-sm" id="btn-z-backward" title="背面">↓</button>
              <button class="btn btn-sm" id="btn-z-forward" title="前面">↑</button>
              <button class="btn btn-sm" id="btn-z-front" title="最前面">⤒</button>
            </div>
          </div>
        </div>
        <div id="connector-props" style="display:none;">
          <div class="prop-group">
            <div class="prop-label">線の種類</div>
            <select class="prop-input" id="prop-connector-linetype">
              <option value="elbow">カギ直線</option>
              <option value="straight">直線</option>
              <option value="arrow">矢印</option>
            </select>
          </div>
          <div class="prop-group">
            <div class="prop-label">ラベル</div>
            <input type="text" class="prop-input" id="prop-connector-label" placeholder="ラベル">
          </div>
          <div class="prop-group">
            <div class="prop-label">方向</div>
            <select class="prop-input" id="prop-connector-direction">
              <option value="none">なし</option>
              <option value="forward">→ 順方向</option>
              <option value="backward">← 逆方向</option>
              <option value="both">↔ 双方向</option>
            </select>
          </div>
        </div>
        <div id="text-props" style="display:none;">
          <div class="prop-group">
            <div class="prop-label">テキスト</div>
            <textarea class="prop-input" id="prop-text-content" rows="3" placeholder="注釈テキスト"></textarea>
          </div>
          <div class="prop-group">
            <div class="prop-label">フォントサイズ</div>
            <input type="number" class="prop-input" id="prop-text-fontsize" value="14" min="8" max="72">
          </div>
          <div class="prop-group">
            <div class="prop-label">色</div>
            <input type="color" class="prop-color-input" id="prop-text-color" value="#2c3e50">
          </div>
        </div>
        <div id="layer-assign-props" style="display:none;">
          <hr style="margin:8px 0;border-color:var(--border-color);">
          <div class="prop-group">
            <div class="prop-label">レイヤー</div>
            <select class="prop-input" id="prop-layer-assign"></select>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <!-- Bulk Create Modal -->
  <div class="modal-overlay" id="bulk-modal">
    <div class="modal-panel">
      <h3 class="modal-title">📋 一括作成</h3>
      <p class="modal-desc">所属とメンバーのタブ区切りデータを貼り付けてください。</p>
      <textarea id="bulk-textarea" class="modal-textarea" rows="10"
        placeholder="営業部&#9;田中太郎&#10;営業部&#9;佐藤花子&#10;開発部&#9;鈴木一郎&#10;開発部&#9;高橋美咲"></textarea>
      <div class="modal-section">
        <h4 class="modal-subtitle">🎲 テストデータ生成</h4>
        <div class="modal-row">
          <label class="modal-label">人数 <input type="number" id="test-person-count" class="modal-input-sm" value="10"
              min="1" max="200"></label>
          <label class="modal-label">組織数 <input type="number" id="test-org-count" class="modal-input-sm" value="3"
              min="1" max="20"></label>
          <button class="btn" id="test-btn-generate">生成</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn" id="bulk-btn-cancel">キャンセル</button>
        <button class="btn btn-primary" id="bulk-btn-create">作成</button>
      </div>
    </div>
  </div>

  <!-- Role Management Modal -->
  <div class="modal-overlay" id="role-modal">
    <div class="modal-panel">
      <h3 class="modal-title">🏷 役割管理</h3>
      <div id="role-list" class="role-list"></div>
      <div class="modal-section">
        <h4 class="modal-subtitle">役割を追加</h4>
        <div class="modal-row">
          <input type="text" id="role-add-name" class="prop-input" placeholder="役割名" style="flex:1;">
          <input type="color" id="role-add-color" class="role-add-color-input" value="#e06c75">
          <select id="role-add-icon" class="role-add-icon-select">
            <option value="">アイコン</option>
            <option value="👑">👑</option>
            <option value="⭐">⭐</option>
            <option value="🔧">🔧</option>
            <option value="📊">📊</option>
            <option value="🎯">🎯</option>
            <option value="💼">💼</option>
            <option value="🛡️">🛡️</option>
            <option value="📝">📝</option>
            <option value="🔬">🔬</option>
            <option value="💡">💡</option>
          </select>
          <button class="btn btn-primary" id="role-btn-add">追加</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="role-btn-close">閉じる</button>
      </div>
    </div>
  </div>

  <!-- Resource Plan Table Modal -->
  <div class="modal-overlay" id="plan-modal">
    <div class="modal-panel" style="width:95%;max-width:1400px;max-height:90vh;overflow:auto;">
      <h3 class="modal-title">📊 リソース計画テーブル</h3>
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
        <label style="font-size:12px;">開始:
          <input type="month" id="plan-start" style="font-size:12px;padding:3px;">
        </label>
        <label style="font-size:12px;">期間数:
          <input type="number" id="plan-count" min="1" max="36" value="12" style="width:50px;font-size:12px;padding:3px;">
        </label>
        <label style="font-size:12px;">単位:
          <select id="plan-unit" style="font-size:12px;padding:3px;">
            <option value="month">月</option>
            <option value="quarter">四半期</option>
          </select>
        </label>
        <button class="btn btn-sm" id="plan-btn-apply" style="font-size:11px;">適用</button>
      </div>
      <div id="plan-table-container" style="overflow-x:auto;max-height:65vh;"></div>
      <div class="modal-actions" style="margin-top:12px;">
        <button class="btn btn-primary" id="plan-btn-close">閉じる</button>
      </div>
    </div>
  </div>

  <!-- Dashboard Modal -->
  <div class="modal-overlay" id="dashboard-modal">
    <div class="modal-panel" style="width:95%;max-width:1200px;max-height:90vh;overflow:auto;">
      <h3 class="modal-title">📈 リソースダッシュボード</h3>
      <div id="dashboard-content"></div>
      <div class="modal-actions" style="margin-top:12px;">
        <button class="btn" id="dashboard-btn-export-csv" style="margin-right:8px;">📥 CSVエクスポート</button>
        <button class="btn btn-primary" id="dashboard-btn-close">閉じる</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
